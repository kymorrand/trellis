<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>Trellis — Living Canvas</title>
  <link rel="stylesheet" href="/static/trellis.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="/static/js/trellis-api.js"></script>
  <script src="/static/js/circadian.js"></script>
  <style>
    :root {
      --bg-top: oklch(93% 0.02 80);
      --bg-bottom: oklch(90% 0.018 75);
    }
    body {
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      overflow: hidden;
      width: 1920px;
      height: 1080px;
      position: relative;
    }

    /* Subtle film grain texture */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.3;
      filter: url(#grain);
      mix-blend-mode: multiply;
    }

    .canvas {
      position: relative;
      z-index: 2;
      width: 1920px;
      height: 1080px;
      display: grid;
      grid-template-columns: 2fr 1fr;
      grid-template-rows: auto 1fr;
      gap: var(--space-4);
      padding: var(--space-8);
    }

    .zone-porch {
      grid-column: 1 / 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-4) var(--space-6);
    }

    .zone-porch__title {
      font-family: var(--font-display);
      font-weight: var(--fraunces-weight);
      font-variation-settings: "SOFT" var(--fraunces-softness), "WONK" 1, "opsz" 36;
      font-size: var(--text-2xl);
      color: var(--color-earth);
      letter-spacing: -0.02em;
    }

    .zone-porch__status { display: flex; gap: var(--space-6); }

    .zone-garden {
      grid-column: 1;
      grid-row: 2;
      padding: var(--space-6);
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: var(--color-wood-light) transparent;
    }
    .zone-garden::-webkit-scrollbar {
      width: 6px;
    }
    .zone-garden::-webkit-scrollbar-track {
      background: transparent;
    }
    .zone-garden::-webkit-scrollbar-thumb {
      background: var(--color-wood-light);
      border-radius: 3px;
    }
    .zone-garden::-webkit-scrollbar-thumb:hover {
      background: var(--color-wood);
    }

    .zone-label {
      font-family: var(--font-display);
      font-size: var(--text-sm);
      font-variation-settings: "SOFT" 40, "WONK" 0;
      color: var(--color-earth-light);
      opacity: 0.35;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: var(--space-4);
    }

    .garden-items {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    .zone-greenhouse {
      grid-column: 2;
      grid-row: 2;
      padding: var(--space-6);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: var(--space-12);
      gap: var(--space-6);
    }

    .agent-state-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-4);
    }

    .agent-avatar {
      position: relative;
      width: 160px;
      height: 160px;
    }
    .agent-avatar__core { width: 100%; height: 100%; }
    .agent-avatar__ripple {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 2px solid var(--color-ivy);
      opacity: 0;
      pointer-events: none;
    }
    .agent-avatar__ripple--outer { inset: -24px; border-width: 1px; }

    .agent-label {
      font-family: var(--font-body);
      font-size: var(--text-md);
      color: var(--color-earth);
      text-align: center;
    }
    .agent-activity {
      font-family: var(--font-code);
      font-variation-settings: "CASL" var(--recursive-casual), "MONO" 1;
      font-size: var(--text-sm);
      color: var(--color-earth-light);
      text-align: center;
      min-height: 1.4em;
    }

    /* Vault cards */
    .trellis-vault-card {
      background: var(--color-cloud);
      border: 1px solid var(--color-wood-light);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      box-shadow: 0 1px 3px oklch(28% 0.02 55 / 0.08);
      display: flex;
      gap: var(--space-3);
      transition: box-shadow 150ms ease-out;
    }
    .trellis-vault-card:hover { box-shadow: 0 2px 8px oklch(28% 0.02 55 / 0.12); }
    .trellis-vault-card--seed { border-style: dashed; opacity: 0.8; }
    .trellis-vault-card--evergreen { border-width: 2px; border-color: var(--color-wood); }
    .trellis-vault-card__content { flex: 1; min-width: 0; }
    .trellis-vault-card__title {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: var(--text-md);
      color: var(--color-earth);
      margin-bottom: var(--space-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .trellis-vault-card__meta {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      align-items: center;
    }
    .growth-icon { width: 28px; height: 28px; flex-shrink: 0; margin-top: 2px; }
    .growth-icon svg { width: 100%; height: 100%; }

    /* Queue cards in greenhouse */
    .greenhouse-queue {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    /* Demo controls */
    .demo-controls {
      position: fixed;
      bottom: var(--space-6);
      left: 50%;
      transform: translateX(-50%);
      display: none;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-4);
      background: var(--color-cloud);
      border: 1px solid var(--color-wood-light);
      border-radius: var(--radius-lg);
      box-shadow: 0 4px 16px oklch(28% 0.02 55 / 0.15);
      z-index: 100;
    }
    .demo-controls--visible { display: flex; }
    .demo-controls__label {
      font-family: var(--font-body);
      font-size: var(--text-sm);
      color: var(--color-earth-light);
      align-self: center;
      margin-right: var(--space-2);
    }
  </style>
</head>
<body>
  <svg style="position:absolute;width:0;height:0" aria-hidden="true">
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </svg>

  <div class="canvas">
    <!-- PORCH -->
    <div class="zone-porch">
      <h1 class="zone-porch__title">Trellis</h1>
      <div class="zone-porch__status">
        <div class="trellis-status">
          <span class="trellis-status__label">Vault</span>
          <span class="trellis-status__value" id="stat-vault">--</span>
        </div>
        <div class="trellis-status">
          <span class="trellis-status__label">API spend</span>
          <span class="trellis-status__value" id="stat-spend">--</span>
        </div>
        <div class="trellis-status">
          <span class="trellis-status__label">Uptime</span>
          <span class="trellis-status__value" id="stat-uptime">--</span>
        </div>
      </div>
    </div>

    <!-- GARDEN -->
    <div class="zone-garden">
      <div class="zone-label">The Garden</div>
      <div class="garden-items" id="garden-items">
        <!-- Populated by JS -->
      </div>
    </div>

    <!-- GREENHOUSE -->
    <div class="zone-greenhouse">
      <div class="zone-label">The Greenhouse</div>
      <div class="agent-state-display">
        <div class="agent-avatar">
          <svg class="agent-avatar__core" viewBox="0 0 160 160" fill="none">
            <circle cx="80" cy="80" r="70" stroke="var(--color-ivy)" stroke-width="2" opacity="0.3"/>
            <circle cx="80" cy="80" r="50" fill="var(--color-ivy)" opacity="0.12"/>
            <g transform="translate(80,80)" stroke="var(--color-ivy)" stroke-width="2" stroke-linecap="round" fill="none">
              <path d="M0 20 L0 -10"/>
              <path d="M0 -10 C-8 -18, -20 -16, -24 -24"/>
              <path d="M0 -10 C8 -18, 20 -16, 24 -24"/>
              <path d="M0 0 C-10 -5, -16 -2, -20 -8"/>
              <path d="M0 0 C10 -5, 16 -2, 20 -8"/>
              <path d="M0 8 C-8 4, -14 6, -16 2"/>
              <path d="M0 8 C8 4, 14 6, 16 2"/>
            </g>
            <circle id="status-dot" cx="120" cy="40" r="6" fill="var(--color-leaf)"/>
          </svg>
          <div class="agent-avatar__ripple" id="ripple-1"></div>
          <div class="agent-avatar__ripple agent-avatar__ripple--outer" id="ripple-2"></div>
        </div>
        <div class="agent-label" id="agent-label">connecting...</div>
        <div class="agent-activity" id="agent-activity"></div>
      </div>
      <div class="greenhouse-queue" id="greenhouse-queue"></div>
    </div>
  </div>

  <!-- Demo controls (show with ?demo=true) -->
  <div class="demo-controls" id="demo-controls">
    <span class="demo-controls__label">Agent State:</span>
    <button class="trellis-btn trellis-btn--secondary trellis-btn--sm" onclick="setState('idle')">Idle</button>
    <button class="trellis-btn trellis-btn--secondary trellis-btn--sm" onclick="setState('thinking')">Thinking</button>
    <button class="trellis-btn trellis-btn--secondary trellis-btn--sm" onclick="setState('acting')">Acting</button>
    <button class="trellis-btn trellis-btn--secondary trellis-btn--sm" onclick="setState('waiting')">Waiting</button>
    <button class="trellis-btn trellis-btn--secondary trellis-btn--sm" onclick="setState('reporting')">Reporting</button>
  </div>

  <script>
    // =============================================
    // Living Canvas — Live Data + GSAP Animations
    // =============================================

    const avatar = document.querySelector('.agent-avatar__core');
    const ripple1 = document.getElementById('ripple-1');
    const ripple2 = document.getElementById('ripple-2');
    const statusDot = document.getElementById('status-dot');
    const label = document.getElementById('agent-label');
    const activity = document.getElementById('agent-activity');

    let currentTimeline = null;
    let currentState = null;

    // Show demo controls if ?demo=true
    if (new URLSearchParams(window.location.search).get('demo') === 'true') {
      document.getElementById('demo-controls').classList.add('demo-controls--visible');
    }

    // ─── Agent State Animation ─────────────────────────────

    const dotColors = {
      idle: 'var(--color-leaf)',
      thinking: 'var(--color-ivy)',
      acting: 'var(--color-leaf)',
      waiting: 'var(--color-wf-yellow)',
      reporting: 'var(--color-ivy)',
    };

    function setState(newState, detail = '') {
      if (currentState === newState) return;
      if (currentTimeline) { currentTimeline.kill(); currentTimeline = null; }
      gsap.set([avatar, ripple1, ripple2], { clearProps: 'all' });
      gsap.set([ripple1, ripple2], { opacity: 0 });

      // Update text
      gsap.to(label, { opacity: 0, duration: 0.15, ease: 'power2.in', onComplete: () => {
        label.textContent = detail || newState;
        gsap.to(label, { opacity: 1, duration: 0.2, ease: 'power2.out' });
      }});
      gsap.to(activity, { opacity: 0, duration: 0.15, ease: 'power2.in', onComplete: () => {
        activity.textContent = detail && detail !== newState ? detail : '';
        gsap.to(activity, { opacity: 1, duration: 0.2, ease: 'power2.out' });
      }});

      gsap.to(statusDot, { fill: dotColors[newState] || dotColors.idle, duration: 0.3 });

      switch (newState) {
        case 'idle':
          currentTimeline = gsap.timeline({ repeat: -1, yoyo: true });
          currentTimeline.to(avatar, { scale: 1.02, duration: 2, ease: 'sine.inOut', transformOrigin: 'center center' });
          break;
        case 'thinking':
          currentTimeline = gsap.timeline({ repeat: -1 });
          currentTimeline
            .set(ripple1, { scale: 0.85, opacity: 0.5 })
            .to(ripple1, { scale: 1.2, opacity: 0, duration: 1.5, ease: 'power1.out' })
            .set(ripple2, { scale: 0.8, opacity: 0.3 }, 0.4)
            .to(ripple2, { scale: 1.3, opacity: 0, duration: 1.5, ease: 'power1.out' }, 0.4);
          gsap.to(avatar, { filter: 'brightness(1.08)', duration: 1, ease: 'sine.inOut', yoyo: true, repeat: -1 });
          break;
        case 'acting':
          currentTimeline = gsap.timeline({ repeat: -1 });
          currentTimeline
            .to(avatar, { y: -4, duration: 0.3, ease: 'power2.out' })
            .to(avatar, { y: 0, duration: 0.3, ease: 'power2.in' })
            .to(avatar, { y: -2, duration: 0.25, ease: 'power2.out' }, '+=0.08')
            .to(avatar, { y: 0, duration: 0.25, ease: 'power2.in' })
            .to({}, { duration: 0.4 });
          break;
        case 'waiting':
          currentTimeline = gsap.timeline({ repeat: -1, yoyo: true });
          currentTimeline.to(avatar, { opacity: 0.7, duration: 1.5, ease: 'sine.inOut' });
          break;
        case 'reporting':
          gsap.to(avatar, { y: -6, scale: 1.05, duration: 0.4, ease: 'power1.inOut', transformOrigin: 'center center' });
          currentTimeline = gsap.timeline({ repeat: -1, yoyo: true, delay: 1 });
          currentTimeline.to(avatar, { scale: 1.06, duration: 2.5, ease: 'sine.inOut', transformOrigin: 'center center' });
          break;
      }
      currentState = newState;
    }

    // ─── Render Vault Cards ────────────────────────────────

    function renderVaultCards(items) {
      const container = document.getElementById('garden-items');
      container.innerHTML = '';

      items.forEach(item => {
        const stageClass = item.growth_stage === 'seed' ? ' trellis-vault-card--seed'
                         : item.growth_stage === 'evergreen' ? ' trellis-vault-card--evergreen'
                         : '';
        const tags = (item.tags || []).map(t =>
          `<span class="trellis-tag trellis-tag--default">${t}</span>`
        ).join('');

        const card = document.createElement('article');
        card.className = `trellis-vault-card${stageClass}`;
        card.innerHTML = `
          <span class="growth-icon">${TrellisAPI.growthSVG(item.growth_stage)}</span>
          <div class="trellis-vault-card__content">
            <div class="trellis-vault-card__title">${item.title}</div>
            <div class="trellis-vault-card__meta">
              <time class="trellis-timestamp">${TrellisAPI.formatGardenTime(item.created, 'planted')}</time>
              <time class="trellis-timestamp">${TrellisAPI.formatGardenTime(item.modified, 'last tended')}</time>
              ${tags}
            </div>
          </div>
        `;
        container.appendChild(card);
      });

      // Entrance animation
      gsap.from('.trellis-vault-card', { opacity: 0, y: 16, duration: 0.3, ease: 'power2.out', stagger: 0.06 });
    }

    // ─── Render Queue Cards ────────────────────────────────

    function renderQueueCards(items) {
      const container = document.getElementById('greenhouse-queue');
      container.innerHTML = '';

      items.forEach(item => {
        const card = document.createElement('article');
        card.className = 'trellis-approval-card';
        card.id = `queue-${item.id}`;
        card.innerHTML = `
          <header class="trellis-approval-card__header">
            <span class="trellis-approval-card__source">Ivy suggests</span>
            <time class="trellis-timestamp">${TrellisAPI.formatGardenTime(item.created.replace(' ', 'T'))}</time>
          </header>
          <div class="trellis-approval-card__body">
            <p>${item.body || item.summary}</p>
          </div>
          <div class="trellis-approval-card__actions">
            <button class="trellis-btn trellis-btn--primary trellis-btn--sm" onclick="approveItem('${item.id}', this)">Approve</button>
            <button class="trellis-btn trellis-btn--ghost trellis-btn--sm" onclick="dismissItem('${item.id}', this)">Dismiss</button>
          </div>
        `;
        container.appendChild(card);
      });

      if (items.length > 0) {
        gsap.from('.greenhouse-queue .trellis-approval-card', { opacity: 0, y: 20, duration: 0.35, ease: 'power2.out', stagger: 0.08 });
      }
    }

    async function approveItem(id, btn) {
      const card = btn.closest('.trellis-approval-card');
      await TrellisAPI.approveItem(id);
      gsap.timeline()
        .to(card, { backgroundColor: 'oklch(72% 0.16 138 / 0.2)', duration: 0.15 })
        .to(card, { opacity: 0, x: 30, duration: 0.25, ease: 'power2.in', onComplete: () => card.remove() });
    }

    async function dismissItem(id, btn) {
      const card = btn.closest('.trellis-approval-card');
      await TrellisAPI.dismissItem(id);
      gsap.to(card, { opacity: 0, y: 10, duration: 0.2, ease: 'power2.in', onComplete: () => card.remove() });
    }

    // ─── Update Porch Stats ────────────────────────────────

    async function updateStats() {
      try {
        const status = await TrellisAPI.getStatus();
        document.getElementById('stat-vault').textContent = `${status.vault_count} items`;
        document.getElementById('stat-spend').textContent = `$${status.api_spend_monthly}`;
        document.getElementById('stat-uptime').textContent = TrellisAPI.formatUptime(status.uptime_seconds);
      } catch (e) {
        console.warn('Failed to fetch status:', e);
      }
    }

    // ─── Initialize ────────────────────────────────────────

    async function init() {
      // Start circadian system
      TrellisCircadian.init();

      // Entrance animations
      gsap.from('.zone-porch', { opacity: 0, y: -20, duration: 0.5, ease: 'power2.out' });
      gsap.from('.zone-garden', { opacity: 0, x: -20, duration: 0.5, ease: 'power2.out', delay: 0.15 });
      gsap.from('.zone-greenhouse', { opacity: 0, x: 20, duration: 0.5, ease: 'power2.out', delay: 0.25 });

      // Load data
      updateStats();
      setInterval(updateStats, 60000);

      try {
        const vault = await TrellisAPI.getVaultItems(9);
        renderVaultCards(vault.items || []);
      } catch (e) {
        console.warn('Failed to fetch vault items:', e);
      }

      try {
        const q = await TrellisAPI.getQueue();
        renderQueueCards(q.items || []);
      } catch (e) {
        console.warn('Failed to fetch queue:', e);
      }

      // Connect to agent state SSE
      TrellisAPI.connectStateStream((stateData) => {
        setState(stateData.state, stateData.detail);
      });

      // Fallback: set idle if SSE hasn't fired after 2s
      setTimeout(() => {
        if (currentState === null) setState('idle');
      }, 2000);
    }

    init();
  </script>
</body>
</html>
