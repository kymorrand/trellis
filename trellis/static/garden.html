<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>The Garden — Armando's Activity</title>
  <link rel="stylesheet" href="/static/trellis.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="/static/js/trellis-api.js"></script>
  <script src="/static/js/circadian.js"></script>
  <style>
    :root {
      --bg-top: oklch(93% 0.02 80);
      --bg-bottom: oklch(90% 0.018 75);
    }
    body {
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      overflow: hidden;
      width: 1920px;
      height: 1080px;
      position: relative;
    }

    /* Film grain — same as canvas.html */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.3;
      filter: url(#grain);
      mix-blend-mode: multiply;
    }

    .garden-page {
      position: relative;
      z-index: 2;
      width: 1920px;
      height: 1080px;
      display: grid;
      grid-template-columns: 1fr 340px;
      grid-template-rows: auto 1fr;
      padding: var(--space-8);
      gap: var(--space-6);
    }

    /* ─── Header ─────────────────────────────── */

    .garden-header {
      grid-column: 1 / -1;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: var(--space-4) var(--space-6);
    }

    .garden-header__left {
      display: flex;
      align-items: baseline;
      gap: var(--space-6);
    }

    .garden-header__title {
      font-family: var(--font-display);
      font-weight: var(--fraunces-weight);
      font-variation-settings: "SOFT" var(--fraunces-softness), "WONK" 1, "opsz" 36;
      font-size: var(--text-2xl);
      color: var(--color-earth);
      letter-spacing: -0.02em;
    }

    .garden-header__subtitle {
      font-family: var(--font-body);
      font-size: var(--text-md);
      color: var(--color-earth-light);
      font-weight: 400;
    }

    /* ─── Report List (left column) ──────────── */

    .garden-content {
      grid-column: 1;
      grid-row: 2;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0 var(--space-6);
      scrollbar-width: thin;
      scrollbar-color: var(--color-wood-light) transparent;
    }
    .garden-content::-webkit-scrollbar { width: 6px; }
    .garden-content::-webkit-scrollbar-track { background: transparent; }
    .garden-content::-webkit-scrollbar-thumb {
      background: var(--color-wood-light);
      border-radius: 3px;
    }
    .garden-content::-webkit-scrollbar-thumb:hover {
      background: var(--color-wood);
    }

    .report-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    /* ─── Sidebar (right column) ─────────────── */

    .garden-sidebar {
      grid-column: 2;
      grid-row: 2;
      padding: 0 var(--space-3);
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .sidebar-label {
      font-family: var(--font-display);
      font-size: var(--text-sm);
      font-variation-settings: "SOFT" 40, "WONK" 0;
      color: var(--color-earth-light);
      opacity: 0.35;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: var(--space-2);
    }

    /* ─── Health Card ────────────────────────── */

    .health-card {
      background: var(--color-cloud);
      border: 1px solid var(--color-wood-light);
      border-left: 3px solid var(--color-ivy);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      box-shadow: 0 1px 3px oklch(28% 0.02 55 / 0.08);
    }

    .health-card__title {
      font-family: var(--font-display);
      font-weight: 700;
      font-variation-settings: "SOFT" var(--fraunces-softness), "WONK" 0, "opsz" 20;
      font-size: var(--text-md);
      line-height: 1.3;
      color: var(--color-earth);
      margin-bottom: var(--space-4);
    }

    .health-card__stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
    }

    .health-stat {
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
    }

    .health-stat__value {
      font-family: var(--font-code);
      font-variation-settings: "CASL" var(--recursive-casual), "MONO" 1;
      font-size: var(--text-md);
      font-weight: 600;
      color: var(--color-earth);
    }

    .health-stat__label {
      font-family: var(--font-body);
      font-size: var(--text-xs);
      color: var(--color-earth-light);
    }

    .health-stat__value--warn {
      color: var(--color-wf-yellow);
    }

    .health-stat__value--danger {
      color: var(--color-wf-red);
    }

    /* Coverage bar */
    .health-coverage {
      margin-bottom: var(--space-3);
    }

    .health-coverage__header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: var(--space-1);
    }

    .health-coverage__label {
      font-family: var(--font-body);
      font-size: var(--text-xs);
      color: var(--color-earth-light);
    }

    .health-coverage__pct {
      font-family: var(--font-code);
      font-variation-settings: "CASL" var(--recursive-casual), "MONO" 1;
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--color-earth);
    }

    .health-coverage__bar {
      height: 6px;
      background: var(--color-cloud-dim);
      border-radius: 3px;
      overflow: hidden;
    }

    .health-coverage__fill {
      height: 100%;
      background: var(--color-leaf);
      border-radius: 3px;
      transition: width 600ms ease-out;
    }

    .health-coverage__fill--warn {
      background: var(--color-wf-yellow);
    }

    .health-coverage__fill--danger {
      background: var(--color-wf-red);
    }

    .health-card__footer {
      font-family: var(--font-code);
      font-variation-settings: "CASL" var(--recursive-casual), "MONO" 1;
      font-size: var(--text-xs);
      color: var(--color-wood-light);
      padding-top: var(--space-3);
      border-top: 1px solid var(--color-cloud-dim);
    }

    /* Hidden until data loads */
    .health-card--hidden {
      display: none;
    }

    /* ─── Report Card ────────────────────────── */

    .report-card {
      background: var(--color-cloud);
      border: 1px solid var(--color-wood-light);
      border-left: 3px solid var(--color-wood-light);
      border-radius: var(--radius-md);
      padding: var(--space-6);
      box-shadow: 0 1px 3px oklch(28% 0.02 55 / 0.08);
    }
    .report-card:hover {
      box-shadow: 0 2px 8px oklch(28% 0.02 55 / 0.12);
    }

    .report-card--root  { border-left-color: var(--color-leaf); }
    .report-card--bloom { border-left-color: var(--color-wf-yellow); }
    .report-card--thorn { border-left-color: var(--color-wf-red); }

    .report-card__header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-3);
    }

    .report-card__agent-tag {
      display: inline-flex;
      align-items: center;
      padding: var(--space-1) var(--space-2);
      font-family: var(--font-code);
      font-variation-settings: "CASL" var(--recursive-casual), "MONO" 1;
      font-size: var(--text-xs);
      font-weight: 600;
      border-radius: var(--radius-lg);
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .report-card__agent-tag--root {
      background: oklch(62% 0.17 145 / 0.12);
      color: var(--color-leaf-dark);
    }
    .report-card__agent-tag--bloom {
      background: oklch(82% 0.15 90 / 0.15);
      color: oklch(55% 0.12 75);
    }
    .report-card__agent-tag--thorn {
      background: oklch(58% 0.17 28 / 0.12);
      color: var(--color-wf-red);
    }

    .report-card__date {
      font-family: var(--font-code);
      font-variation-settings: "CASL" var(--recursive-casual), "MONO" 1;
      font-size: var(--text-xs);
      color: var(--color-earth-light);
    }

    .report-card__type {
      font-family: var(--font-code);
      font-variation-settings: "CASL" var(--recursive-casual), "MONO" 1;
      font-size: var(--text-xs);
      color: var(--color-wood-light);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .report-card__title {
      font-family: var(--font-display);
      font-weight: 700;
      font-variation-settings: "SOFT" var(--fraunces-softness), "WONK" 0, "opsz" 24;
      font-size: var(--text-lg);
      line-height: 1.3;
      letter-spacing: -0.01em;
      color: var(--color-earth);
      margin-bottom: var(--space-2);
    }

    .report-card__summary {
      font-family: var(--font-body);
      font-weight: 400;
      font-size: var(--text-base);
      line-height: 1.6;
      color: var(--color-earth-light);
      max-width: 65ch;
    }

    /* ─── Empty State ────────────────────────── */

    .garden-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-24) 0;
      gap: var(--space-4);
    }

    .garden-empty__icon {
      width: 64px;
      height: 64px;
      color: var(--color-wood-light);
      opacity: 0.5;
    }

    .garden-empty__message {
      font-family: var(--font-body);
      font-size: var(--text-md);
      color: var(--color-earth-light);
      font-style: italic;
    }

    /* ─── Date Group Headers ─────────────────── */

    .report-date-group {
      font-family: var(--font-code);
      font-variation-settings: "CASL" var(--recursive-casual), "MONO" 1;
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-wood-light);
      padding: var(--space-2) 0;
      margin-top: var(--space-4);
    }
    .report-date-group:first-child {
      margin-top: 0;
    }
  </style>
</head>
<body>
  <svg style="position:absolute;width:0;height:0" aria-hidden="true">
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </svg>

  <div class="garden-page">
    <!-- HEADER -->
    <header class="garden-header">
      <div class="garden-header__left">
        <div>
          <h1 class="garden-header__title">The Garden</h1>
          <p class="garden-header__subtitle">Armando's Activity</p>
        </div>
        <nav class="trellis-nav">
          <a href="/" class="trellis-nav__link">Start</a>
          <a href="/canvas" class="trellis-nav__link">Canvas</a>
          <a href="/brief" class="trellis-nav__link">Brief</a>
          <a href="/inbox" class="trellis-nav__link">Inbox</a>
          <a href="/garden" class="trellis-nav__link trellis-nav__link--active">Garden</a>
        </nav>
      </div>
    </header>

    <!-- REPORT LIST (left) -->
    <div class="garden-content">
      <div class="report-list" id="report-list">
        <!-- Populated by JS -->
      </div>
    </div>

    <!-- SIDEBAR (right) -->
    <aside class="garden-sidebar">
      <div>
        <div class="sidebar-label">Garden Health</div>
        <div class="health-card health-card--hidden" id="health-card">
          <h2 class="health-card__title">Knowledge Index</h2>

          <div class="health-coverage" id="health-coverage">
            <div class="health-coverage__header">
              <span class="health-coverage__label">Index coverage</span>
              <span class="health-coverage__pct" id="health-pct">--</span>
            </div>
            <div class="health-coverage__bar">
              <div class="health-coverage__fill" id="health-fill" style="width: 0%"></div>
            </div>
          </div>

          <div class="health-card__stats">
            <div class="health-stat">
              <span class="health-stat__value" id="health-total">--</span>
              <span class="health-stat__label">Total files</span>
            </div>
            <div class="health-stat">
              <span class="health-stat__value" id="health-indexed">--</span>
              <span class="health-stat__label">Indexed</span>
            </div>
            <div class="health-stat">
              <span class="health-stat__value" id="health-stale">--</span>
              <span class="health-stat__label">Stale</span>
            </div>
            <div class="health-stat">
              <span class="health-stat__value" id="health-orphan">--</span>
              <span class="health-stat__label">Orphaned</span>
            </div>
          </div>

          <div class="health-card__footer" id="health-footer">
            Last indexed: --
          </div>
        </div>
      </div>
    </aside>
  </div>

  <script>
    // =============================================
    // The Garden — Gardener Activity Reports
    // =============================================

    const agentRoles = {
      root:  'Root',
      bloom: 'Bloom',
      thorn: 'Thorn',
    };

    function formatDate(dateStr) {
      try {
        const [year, month, day] = dateStr.split('-').map(Number);
        const date = new Date(year, month - 1, day);
        return date.toLocaleDateString('en-US', {
          weekday: 'long',
          year: 'numeric',
          month: 'long',
          day: 'numeric',
        });
      } catch {
        return dateStr;
      }
    }

    function formatTypeLabel(type) {
      if (type === 'status') return 'status report';
      if (type === 'garden-report') return 'garden report';
      return type;
    }

    function renderReports(reports) {
      const container = document.getElementById('report-list');
      container.innerHTML = '';

      if (!reports || reports.length === 0) {
        container.innerHTML = `
          <div class="garden-empty">
            <svg class="garden-empty__icon" viewBox="0 0 64 64" fill="none"
                 stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <line x1="32" y1="52" x2="32" y2="24"/>
              <path d="M32 24 C28 20, 22 21, 20 17"/>
              <path d="M32 24 C36 20, 42 21, 44 17"/>
              <path d="M32 32 C27 28, 22 30, 20 26"/>
              <path d="M32 32 C37 28, 42 30, 44 26"/>
              <path d="M32 40 C28 37, 24 38, 22 35"/>
              <path d="M32 40 C36 37, 40 38, 42 35"/>
            </svg>
            <p class="garden-empty__message">No reports yet. The garden is quiet.</p>
          </div>
        `;
        return;
      }

      let lastDate = null;

      reports.forEach(report => {
        // Insert date group header when date changes
        if (report.date !== lastDate) {
          const header = document.createElement('div');
          header.className = 'report-date-group';
          header.textContent = formatDate(report.date);
          container.appendChild(header);
          lastDate = report.date;
        }

        const agentClass = report.agent || 'root';
        const card = document.createElement('article');
        card.className = `report-card report-card--${agentClass}`;
        card.innerHTML = `
          <div class="report-card__header">
            <span class="report-card__agent-tag report-card__agent-tag--${agentClass}">
              ${agentRoles[agentClass] || agentClass}
            </span>
            <span class="report-card__type">${formatTypeLabel(report.type)}</span>
            <span class="report-card__date">${report.date}</span>
          </div>
          <h2 class="report-card__title">${escapeHTML(report.title)}</h2>
          <p class="report-card__summary">${escapeHTML(report.summary)}</p>
        `;
        container.appendChild(card);
      });

      // Entrance animation
      gsap.from('.report-card', {
        opacity: 0,
        y: 16,
        duration: 0.3,
        ease: 'power2.out',
        stagger: 0.06,
      });

      gsap.from('.report-date-group', {
        opacity: 0,
        duration: 0.2,
        ease: 'power2.out',
        stagger: 0.06,
      });
    }

    function escapeHTML(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ─── Health Card ──────────────────────────────────────

    function renderHealth(data) {
      const card = document.getElementById('health-card');
      const pct = data.index_coverage_pct;

      // Coverage percentage + bar
      document.getElementById('health-pct').textContent = `${Math.round(pct)}%`;
      const fill = document.getElementById('health-fill');
      fill.style.width = '0%';

      // Color the bar based on coverage level
      fill.className = 'health-coverage__fill';
      if (pct < 50) {
        fill.classList.add('health-coverage__fill--danger');
      } else if (pct < 80) {
        fill.classList.add('health-coverage__fill--warn');
      }

      // Stats
      document.getElementById('health-total').textContent = data.total_files;
      document.getElementById('health-indexed').textContent = data.indexed_files;

      const staleEl = document.getElementById('health-stale');
      staleEl.textContent = data.stale_files;
      staleEl.className = 'health-stat__value';
      if (data.stale_files > 0) {
        staleEl.classList.add(data.stale_files > 10 ? 'health-stat__value--danger' : 'health-stat__value--warn');
      }

      const orphanEl = document.getElementById('health-orphan');
      orphanEl.textContent = data.orphan_files;
      orphanEl.className = 'health-stat__value';
      if (data.orphan_files > 0) {
        orphanEl.classList.add(data.orphan_files > 10 ? 'health-stat__value--danger' : 'health-stat__value--warn');
      }

      // Last indexed timestamp
      if (data.last_indexed) {
        const ts = TrellisAPI.formatGardenTime(data.last_indexed, 'indexed');
        document.getElementById('health-footer').textContent = `Last ${ts}`;
      } else {
        document.getElementById('health-footer').textContent = 'Never indexed';
      }

      // Reveal card
      card.classList.remove('health-card--hidden');

      // Animate entrance
      gsap.from(card, {
        opacity: 0,
        x: 20,
        duration: 0.4,
        ease: 'power2.out',
        delay: 0.3,
      });

      // Animate bar fill after card appears
      requestAnimationFrame(() => {
        gsap.to(fill, {
          width: `${Math.min(pct, 100)}%`,
          duration: 0.8,
          ease: 'power2.out',
          delay: 0.5,
        });
      });
    }

    // ─── Initialize ────────────────────────────────────────

    async function init() {
      // Start circadian system
      TrellisCircadian.init();

      // Entrance animations for page structure
      gsap.from('.garden-header', {
        opacity: 0,
        y: -20,
        duration: 0.5,
        ease: 'power2.out',
      });
      gsap.from('.garden-content', {
        opacity: 0,
        x: -20,
        duration: 0.5,
        ease: 'power2.out',
        delay: 0.15,
      });
      gsap.from('.garden-sidebar', {
        opacity: 0,
        x: 20,
        duration: 0.5,
        ease: 'power2.out',
        delay: 0.2,
      });

      // Fetch gardener status (reports)
      try {
        const res = await fetch('/api/gardener/status');
        const data = await res.json();
        renderReports(data.reports || []);
      } catch (e) {
        console.warn('Failed to fetch gardener status:', e);
        renderReports([]);
      }

      // Fetch gardener health (index stats)
      // 503 = knowledge_manager unavailable (standalone dev mode) — silently skip
      try {
        const res = await fetch('/api/gardener/health');
        if (res.ok) {
          const data = await res.json();
          renderHealth(data);
        } else if (res.status !== 503) {
          console.warn('Gardener health returned', res.status);
        }
      } catch (e) {
        console.warn('Failed to fetch gardener health:', e);
      }
    }

    init();
  </script>
  <link rel="stylesheet" href="/static/debug-panel.css">
  <script src="/static/js/debug-capture.js"></script>
</body>
</html>
