<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>The Garden — Armando's Activity</title>
  <link rel="stylesheet" href="/static/trellis.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="/static/js/trellis-api.js"></script>
  <script src="/static/js/circadian.js"></script>
  <style>
    :root {
      --bg-top: oklch(93% 0.02 80);
      --bg-bottom: oklch(90% 0.018 75);
    }
    body {
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      overflow: hidden;
      width: 1920px;
      height: 1080px;
      position: relative;
    }

    /* Film grain — same as canvas.html */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.3;
      filter: url(#grain);
      mix-blend-mode: multiply;
    }

    .garden-page {
      position: relative;
      z-index: 2;
      width: 1920px;
      height: 1080px;
      display: grid;
      grid-template-rows: auto 1fr;
      padding: var(--space-8);
      gap: var(--space-6);
    }

    /* ─── Header ─────────────────────────────── */

    .garden-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: var(--space-4) var(--space-6);
    }

    .garden-header__title {
      font-family: var(--font-display);
      font-weight: var(--fraunces-weight);
      font-variation-settings: "SOFT" var(--fraunces-softness), "WONK" 1, "opsz" 36;
      font-size: var(--text-2xl);
      color: var(--color-earth);
      letter-spacing: -0.02em;
    }

    .garden-header__subtitle {
      font-family: var(--font-body);
      font-size: var(--text-md);
      color: var(--color-earth-light);
      font-weight: 400;
    }

    .garden-header__nav {
      display: flex;
      gap: var(--space-3);
      align-items: center;
    }

    .garden-header__nav a {
      font-family: var(--font-body);
      font-size: var(--text-sm);
      color: var(--color-earth-light);
      text-decoration: none;
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-sm);
      transition: color 150ms ease-out, background 150ms ease-out;
    }
    .garden-header__nav a:hover {
      color: var(--color-earth);
      background: var(--color-cloud-dim);
    }

    /* ─── Report List ────────────────────────── */

    .garden-content {
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0 var(--space-6);
      scrollbar-width: thin;
      scrollbar-color: var(--color-wood-light) transparent;
    }
    .garden-content::-webkit-scrollbar { width: 6px; }
    .garden-content::-webkit-scrollbar-track { background: transparent; }
    .garden-content::-webkit-scrollbar-thumb {
      background: var(--color-wood-light);
      border-radius: 3px;
    }
    .garden-content::-webkit-scrollbar-thumb:hover {
      background: var(--color-wood);
    }

    .report-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      max-width: 1200px;
    }

    /* ─── Report Card ────────────────────────── */

    .report-card {
      background: var(--color-cloud);
      border: 1px solid var(--color-wood-light);
      border-left: 3px solid var(--color-wood-light);
      border-radius: var(--radius-md);
      padding: var(--space-6);
      box-shadow: 0 1px 3px oklch(28% 0.02 55 / 0.08);
    }
    .report-card:hover {
      box-shadow: 0 2px 8px oklch(28% 0.02 55 / 0.12);
    }

    .report-card--root  { border-left-color: var(--color-leaf); }
    .report-card--bloom { border-left-color: var(--color-wf-yellow); }
    .report-card--thorn { border-left-color: var(--color-wf-red); }

    .report-card__header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-3);
    }

    .report-card__agent-tag {
      display: inline-flex;
      align-items: center;
      padding: var(--space-1) var(--space-2);
      font-family: var(--font-code);
      font-variation-settings: "CASL" var(--recursive-casual), "MONO" 1;
      font-size: var(--text-xs);
      font-weight: 600;
      border-radius: var(--radius-lg);
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .report-card__agent-tag--root {
      background: oklch(62% 0.17 145 / 0.12);
      color: var(--color-leaf-dark);
    }
    .report-card__agent-tag--bloom {
      background: oklch(82% 0.15 90 / 0.15);
      color: oklch(55% 0.12 75);
    }
    .report-card__agent-tag--thorn {
      background: oklch(58% 0.17 28 / 0.12);
      color: var(--color-wf-red);
    }

    .report-card__date {
      font-family: var(--font-code);
      font-variation-settings: "CASL" var(--recursive-casual), "MONO" 1;
      font-size: var(--text-xs);
      color: var(--color-earth-light);
    }

    .report-card__type {
      font-family: var(--font-code);
      font-variation-settings: "CASL" var(--recursive-casual), "MONO" 1;
      font-size: var(--text-xs);
      color: var(--color-wood-light);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .report-card__title {
      font-family: var(--font-display);
      font-weight: 700;
      font-variation-settings: "SOFT" var(--fraunces-softness), "WONK" 0, "opsz" 24;
      font-size: var(--text-lg);
      line-height: 1.3;
      letter-spacing: -0.01em;
      color: var(--color-earth);
      margin-bottom: var(--space-2);
    }

    .report-card__summary {
      font-family: var(--font-body);
      font-weight: 400;
      font-size: var(--text-base);
      line-height: 1.6;
      color: var(--color-earth-light);
      max-width: 65ch;
    }

    /* ─── Empty State ────────────────────────── */

    .garden-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-24) 0;
      gap: var(--space-4);
    }

    .garden-empty__icon {
      width: 64px;
      height: 64px;
      color: var(--color-wood-light);
      opacity: 0.5;
    }

    .garden-empty__message {
      font-family: var(--font-body);
      font-size: var(--text-md);
      color: var(--color-earth-light);
      font-style: italic;
    }

    /* ─── Date Group Headers ─────────────────── */

    .report-date-group {
      font-family: var(--font-code);
      font-variation-settings: "CASL" var(--recursive-casual), "MONO" 1;
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-wood-light);
      padding: var(--space-2) 0;
      margin-top: var(--space-4);
    }
    .report-date-group:first-child {
      margin-top: 0;
    }
  </style>
</head>
<body>
  <svg style="position:absolute;width:0;height:0" aria-hidden="true">
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </svg>

  <div class="garden-page">
    <!-- HEADER -->
    <header class="garden-header">
      <div>
        <h1 class="garden-header__title">The Garden</h1>
        <p class="garden-header__subtitle">Armando's Activity</p>
      </div>
      <nav class="garden-header__nav">
        <a href="/">Canvas</a>
        <a href="/brief">Brief</a>
        <a href="/garden" style="color: var(--color-earth); font-weight: 600;">Garden</a>
      </nav>
    </header>

    <!-- REPORT LIST -->
    <div class="garden-content">
      <div class="report-list" id="report-list">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>

  <script>
    // =============================================
    // The Garden — Gardener Activity Reports
    // =============================================

    const agentRoles = {
      root:  'Root',
      bloom: 'Bloom',
      thorn: 'Thorn',
    };

    function formatDate(dateStr) {
      try {
        const [year, month, day] = dateStr.split('-').map(Number);
        const date = new Date(year, month - 1, day);
        return date.toLocaleDateString('en-US', {
          weekday: 'long',
          year: 'numeric',
          month: 'long',
          day: 'numeric',
        });
      } catch {
        return dateStr;
      }
    }

    function formatTypeLabel(type) {
      if (type === 'status') return 'status report';
      if (type === 'garden-report') return 'garden report';
      return type;
    }

    function renderReports(reports) {
      const container = document.getElementById('report-list');
      container.innerHTML = '';

      if (!reports || reports.length === 0) {
        container.innerHTML = `
          <div class="garden-empty">
            <svg class="garden-empty__icon" viewBox="0 0 64 64" fill="none"
                 stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <line x1="32" y1="52" x2="32" y2="24"/>
              <path d="M32 24 C28 20, 22 21, 20 17"/>
              <path d="M32 24 C36 20, 42 21, 44 17"/>
              <path d="M32 32 C27 28, 22 30, 20 26"/>
              <path d="M32 32 C37 28, 42 30, 44 26"/>
              <path d="M32 40 C28 37, 24 38, 22 35"/>
              <path d="M32 40 C36 37, 40 38, 42 35"/>
            </svg>
            <p class="garden-empty__message">No reports yet. The garden is quiet.</p>
          </div>
        `;
        return;
      }

      let lastDate = null;

      reports.forEach(report => {
        // Insert date group header when date changes
        if (report.date !== lastDate) {
          const header = document.createElement('div');
          header.className = 'report-date-group';
          header.textContent = formatDate(report.date);
          container.appendChild(header);
          lastDate = report.date;
        }

        const agentClass = report.agent || 'root';
        const card = document.createElement('article');
        card.className = `report-card report-card--${agentClass}`;
        card.innerHTML = `
          <div class="report-card__header">
            <span class="report-card__agent-tag report-card__agent-tag--${agentClass}">
              ${agentRoles[agentClass] || agentClass}
            </span>
            <span class="report-card__type">${formatTypeLabel(report.type)}</span>
            <span class="report-card__date">${report.date}</span>
          </div>
          <h2 class="report-card__title">${escapeHTML(report.title)}</h2>
          <p class="report-card__summary">${escapeHTML(report.summary)}</p>
        `;
        container.appendChild(card);
      });

      // Entrance animation
      gsap.from('.report-card', {
        opacity: 0,
        y: 16,
        duration: 0.3,
        ease: 'power2.out',
        stagger: 0.06,
      });

      gsap.from('.report-date-group', {
        opacity: 0,
        duration: 0.2,
        ease: 'power2.out',
        stagger: 0.06,
      });
    }

    function escapeHTML(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ─── Initialize ────────────────────────────────────────

    async function init() {
      // Start circadian system
      TrellisCircadian.init();

      // Entrance animations for page structure
      gsap.from('.garden-header', {
        opacity: 0,
        y: -20,
        duration: 0.5,
        ease: 'power2.out',
      });
      gsap.from('.garden-content', {
        opacity: 0,
        y: 20,
        duration: 0.5,
        ease: 'power2.out',
        delay: 0.15,
      });

      // Fetch gardener status
      try {
        const res = await fetch('/api/gardener/status');
        const data = await res.json();
        renderReports(data.reports || []);
      } catch (e) {
        console.warn('Failed to fetch gardener status:', e);
        renderReports([]);
      }
    }

    init();
  </script>
</body>
</html>
